<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Cake Ordering</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#fff7f0;
}

header{
background:#e67e22;
color:white;
text-align:center;
padding:20px;
}

nav{
background:#ca6f1e;
padding:12px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:15px;
font-weight:bold;
}

.hero{
background:linear-gradient(to right,#f39c12,#f8c471);
color:white;
text-align:center;
padding:50px;
}

.container{
width:90%;
margin:auto;
padding:40px 0;
}

.cakes{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:40px;
}

.cake-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.form-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#e67e22;
color:white;
padding:12px 25px;
border:none;
border-radius:5px;
cursor:pointer;
}

#result{
margin-top:20px;
font-weight:bold;
color:green;
}

footer{
background:#333;
color:white;
text-align:center;
padding:15px;
}

</style>
</head>
<body>

<header>
<h1>🎂 Sweet Delights</h1>
<p>Online Cake Ordering System</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Cakes</a>
<a href="#">Order</a>
<a href="#">Contact</a>
</nav>

<section class="hero">
<h1>Celebrate With Delicious Cakes</h1>
<p>Order Fresh Cakes Online</p>
</section>

<div class="container">

<h2>Popular Cakes</h2>

<div class="cakes">

<div class="cake-card">
<h3>Chocolate Cake</h3>
<p>₹500</p>
</div>

<div class="cake-card">
<h3>Black Forest Cake</h3>
<p>₹700</p>
</div>

<div class="cake-card">
<h3>Red Velvet Cake</h3>
<p>₹900</p>
</div>

</div>

<div class="form-box">

<h2>Place Order</h2>

<input type="text" id="name" placeholder="Customer Name">

<input type="text" id="address" placeholder="Delivery Address">

<select id="cake">
<option>Chocolate Cake</option>
<option>Black Forest Cake</option>
<option>Red Velvet Cake</option>
</select>

<input type="number" id="qty" placeholder="Quantity">

<button onclick="orderCake()">Order Now</button>

<div id="result"></div>

</div>

</div>

<footer>
<p>© 2026 Sweet Delights Cake Shop</p>
</footer>

<script>

function orderCake(){

let name=document.getElementById("name").value;
let address=document.getElementById("address").value;
let qty=document.getElementById("qty").value;

if(name=="" || address=="" || qty==""){
alert("Please fill all details");
return;
}

document.getElementById("result").innerHTML=
"🎂 Order Placed Successfully!<br><br>"+
"Customer: "+name+"<br>"+
"Quantity: "+qty+" Cake(s)";

}

</script>

</body>
</html>
