<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Bus Ticket Booking</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef5ff;
}

header{
background:#2980b9;
color:white;
text-align:center;
padding:20px;
}

nav{
background:#1f618d;
padding:12px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:15px;
font-weight:bold;
}

.hero{
background:linear-gradient(to right,#3498db,#5dade2);
color:white;
text-align:center;
padding:50px;
}

.container{
width:90%;
margin:auto;
padding:40px 0;
}

.bus-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:40px;
}

.bus-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.bus-card h3{
color:#2980b9;
}

.form-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#2980b9;
color:white;
padding:12px 25px;
border:none;
border-radius:5px;
cursor:pointer;
}

#result{
margin-top:20px;
font-weight:bold;
color:green;
}

footer{
background:#333;
color:white;
text-align:center;
padding:15px;
}

</style>
</head>
<body>

<header>
<h1>🚌 Smart Bus Booking</h1>
<p>Online Bus Ticket Reservation System</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Routes</a>
<a href="#">Booking</a>
<a href="#">Contact</a>
</nav>

<section class="hero">
<h1>Travel Comfortably</h1>
<p>Book Bus Tickets Anytime Anywhere</p>
</section>

<div class="container">

<h2>Available Buses</h2>

<div class="bus-list">

<div class="bus-card">
<h3>Chennai → Bangalore</h3>
<p>₹800</p>
</div>

<div class="bus-card">
<h3>Chennai → Hyderabad</h3>
<p>₹1200</p>
</div>

<div class="bus-card">
<h3>Chennai → Coimbatore</h3>
<p>₹700</p>
</div>

</div>

<div class="form-box">

<h2>Book Bus Ticket</h2>

<input type="text" id="name" placeholder="Passenger Name">

<input type="text" id="from" placeholder="From">

<input type="text" id="to" placeholder="To">

<input type="date" id="date">

<select id="seats">
<option>1 Seat</option>
<option>2 Seats</option>
<option>3 Seats</option>
<option>4 Seats</option>
</select>

<button onclick="bookTicket()">Book Ticket</button>

<div id="result"></div>

</div>

</div>

<footer>
<p>© 2026 Smart Bus Booking</p>
</footer>

<script>

function bookTicket(){

let name=document.getElementById("name").value;
let from=document.getElementById("from").value;
let to=document.getElementById("to").value;
let date=document.getElementById("date").value;

if(name=="" || from=="" || to=="" || date==""){
alert("Please fill all details");
return;
}

document.getElementById("result").innerHTML=
"🚌 Ticket Booked Successfully!<br><br>"+
"Passenger: "+name+"<br>"+
"Route: "+from+" → "+to+"<br>"+
"Date: "+date;

}

</script>

</body>
</html>
