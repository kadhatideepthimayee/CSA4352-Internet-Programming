<!DOCTYPE html>
<html>
<head>
    <title>Style Sheets Example</title>

    <style>
        body{
            background-color: lightblue;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1{
            color: darkblue;
        }

        p{
            color: green;
            font-size: 20px;
        }

        .box{
            background-color: white;
            width: 300px;
            margin: auto;
            padding: 20px;
            border: 2px solid black;
            border-radius: 10px;
        }

        button{
            background-color: blue;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
        }

        button:hover{
            background-color: darkblue;
        }
    </style>

</head>

<body>

    <h1>Style Sheets in HTML</h1>

    <div class="box">
        <p>This page is designed using CSS Style Sheets.</p>
        <button>Click Me</button>
    </div>

</body>
</html>
