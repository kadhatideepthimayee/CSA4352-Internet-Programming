<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Flight Reservation</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef7ff;
}

header{
background:#2980b9;
color:white;
text-align:center;
padding:20px;
}

nav{
background:#21618c;
padding:12px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:15px;
font-weight:bold;
}

.hero{
background:linear-gradient(to right,#3498db,#85c1e9);
color:white;
text-align:center;
padding:50px;
}

.container{
width:90%;
margin:auto;
padding:40px 0;
}

.flight-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:40px;
}

.flight-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.form-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#2980b9;
color:white;
padding:12px 25px;
border:none;
border-radius:5px;
cursor:pointer;
}

#result{
margin-top:20px;
color:green;
font-weight:bold;
}

footer{
background:#333;
color:white;
text-align:center;
padding:15px;
}

</style>
</head>
<body>

<header>
<h1>✈ SkyFly Airlines</h1>
<p>Online Flight Reservation System</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Flights</a>
<a href="#">Booking</a>
<a href="#">Contact</a>
</nav>

<section class="hero">
<h1>Fly Around The World</h1>
<p>Book Your Flight in Minutes</p>
</section>

<div class="container">

<h2>Available Flights</h2>

<div class="flight-list">

<div class="flight-card">
<h3>Air India</h3>
<p>Chennai → Delhi</p>
</div>

<div class="flight-card">
<h3>IndiGo</h3>
<p>Chennai → Mumbai</p>
</div>

<div class="flight-card">
<h3>Vistara</h3>
<p>Chennai → Bangalore</p>
</div>

</div>

<div class="form-box">

<h2>Flight Booking</h2>

<input type="text" id="name" placeholder="Passenger Name">

<input type="text" id="from" placeholder="From">

<input type="text" id="to" placeholder="To">

<input type="date" id="date">

<select id="class">
<option>Economy</option>
<option>Business</option>
<option>First Class</option>
</select>

<button onclick="bookFlight()">Book Flight</button>

<div id="result"></div>

</div>

</div>

<footer>
<p>© 2026 SkyFly Airlines</p>
</footer>

<script>

function bookFlight(){

let name=document.getElementById("name").value;
let from=document.getElementById("from").value;
let to=document.getElementById("to").value;
let date=document.getElementById("date").value;

if(name=="" || from=="" || to=="" || date==""){
alert("Please fill all fields");
return;
}

document.getElementById("result").innerHTML=
"✈ Flight Booked Successfully!<br><br>"+
"Passenger: "+name+"<br>"+
"Route: "+from+" → "+to+"<br>"+
"Departure Date: "+date;

}

</script>

</body>
</html>
