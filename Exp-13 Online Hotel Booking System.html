<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Stay Hotel Booking</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#8e44ad;
color:white;
text-align:center;
padding:20px;
}

nav{
background:#6c3483;
padding:12px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:15px;
font-weight:bold;
}

.hero{
background:linear-gradient(to right,#9b59b6,#e056fd);
color:white;
text-align:center;
padding:50px;
}

.container{
width:90%;
margin:auto;
padding:40px 0;
}

.rooms{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:40px;
}

.room-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.room-card h3{
color:#8e44ad;
}

.form-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#8e44ad;
color:white;
padding:12px 25px;
border:none;
border-radius:5px;
cursor:pointer;
}

#result{
margin-top:20px;
font-weight:bold;
color:green;
}

footer{
background:#333;
color:white;
text-align:center;
padding:15px;
}

</style>
</head>
<body>

<header>
<h1>🏨 Royal Stay Hotel</h1>
<p>Online Room Booking System</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Rooms</a>
<a href="#">Booking</a>
<a href="#">Contact</a>
</nav>

<section class="hero">
<h1>Book Your Dream Stay</h1>
<p>Luxury Rooms at Affordable Prices</p>
</section>

<div class="container">

<h2>Available Rooms</h2>

<div class="rooms">

<div class="room-card">
<h3>Single Room</h3>
<p>₹2000 / Night</p>
</div>

<div class="room-card">
<h3>Double Room</h3>
<p>₹3500 / Night</p>
</div>

<div class="room-card">
<h3>Suite Room</h3>
<p>₹6000 / Night</p>
</div>

</div>

<div class="form-box">

<h2>Book Room</h2>

<input type="text" id="name" placeholder="Customer Name">

<input type="tel" id="phone" placeholder="Phone Number">

<select id="room">
<option>Select Room</option>
<option>Single Room</option>
<option>Double Room</option>
<option>Suite Room</option>
</select>

<input type="date" id="checkin">

<input type="date" id="checkout">

<button onclick="bookRoom()">Book Now</button>

<div id="result"></div>

</div>

</div>

<footer>
<p>© 2026 Royal Stay Hotel</p>
</footer>

<script>

function bookRoom(){

let name=document.getElementById("name").value;
let room=document.getElementById("room").value;
let checkin=document.getElementById("checkin").value;

if(name=="" || checkin==""){
alert("Please fill all fields");
return;
}

document.getElementById("result").innerHTML=
"🏨 Booking Successful!<br><br>"+
"Customer: "+name+"<br>"+
"Room: "+room+"<br>"+
"Check-In: "+checkin;

}

</script>

</body>
</html>
