<!DOCTYPE html>
<html>
<head>
<title>Dynamic Page</title>

<script>
function showMessage()
{
document.getElementById("demo").innerHTML=
"Welcome to Dynamic Web Page";
}
</script>

</head>

<body>

<h2>Dynamic Web Page Example</h2>

<button onclick="showMessage()">
Click Here
</button>

<p id="demo"></p>

</body>
</html>
